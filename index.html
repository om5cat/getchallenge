<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲットチャレンジ決定機</title>

<style>

body{
    background:#1e1e1e;
    color:white;
    font-family:sans-serif;
    text-align:center;
    margin-top:80px;
}

h1{
    font-size:40px;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
}

#mainButton{
    background:gold;
}

.good{
    background:#4CAF50;
    color:white;
}

.bad{
    background:#ff4444;
    color:white;
}

#result{
    font-size:60px;
    margin-top:40px;
}

#message{
    margin-top:30px;
    font-size:28px;
}

#omikuji{
    margin-top:20px;
    font-size:32px;
    color:gold;
}

</style>
</head>

<body>

<h1>ゲットチャレンジ決定機</h1>

<button id="mainButton" onclick="drawCard()">
選ぶ！
</button>

<div id="result">？</div>

<div id="judgeButtons"></div>

<div id="message"></div>

<div id="omikuji"></div>

<script>

function drawCard(){

    let number = Math.floor(Math.random()*5)+1;

    document.getElementById("result").innerHTML =
    number + "枚目！";

    document.getElementById("judgeButtons").innerHTML = `
    <button class="good" onclick="goodResult()">
    最高！
    </button>

    <button class="bad" onclick="badResult()">
    最低…
    </button>
    `;

    document.getElementById("message").innerHTML = "";
    document.getElementById("omikuji").innerHTML = "";
}

function goodResult(){

    let messages = [
        "神引き！！！！",
        "今日は持ってる🔥",
        "その選択、完璧。",
        "運を支配している。",
        "波が来てる！！！"
    ];

    let random =
    Math.floor(Math.random()*messages.length);

    document.getElementById("message").innerHTML =
    messages[random];

    document.getElementById("omikuji").innerHTML = "";
}

function badResult(){

    let excuses = [
        "指が滑った…",
        "今のシャッフル速すぎた。",
        "端は危険だった。",
        "欲を出した結果…。",
        "これは逆にレア。"
    ];

    let random =
    Math.floor(Math.random()*excuses.length);

    document.getElementById("message").innerHTML =
    excuses[random];

    let luck = [
        "大吉🌈",
        "中吉✨",
        "吉🍀",
        "小吉🙂",
        "凶☠️"
    ];

    let randomLuck =
    Math.floor(Math.random()*luck.length);

    document.getElementById("omikuji").innerHTML =
    "運気回復おみくじ：" + luck[randomLuck];
}

</script>

</body>
</html>
