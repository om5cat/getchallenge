<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲットチャレンジ導くくん</title>

<style>

body{
    background-image: url("robot.png");
    background:#1e1e1e;
    color:white;
    font-family:sans-serif;
    text-align:center;
    margin-top:80px;
}

h1{
    font-size:40px;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
}

#mainButton{
    background:gold;
}

.good{
    background:#4CAF50;
    color:white;
}

.bad{
    background:#ff4444;
    color:white;
}

#result{
    font-size:60px;
    margin-top:40px;
}

#message{
    margin-top:30px;
    font-size:28px;
}

#omikuji{
    margin-top:20px;
    font-size:32px;
    color:gold;
}

    .question{
    font-size: 28px;
    margin-top: 20px;
    margin-bottom: 15px;
    color: white;
}
    
</style>
</head>

<body>

<h1>ゲットチャレンジ導くくん</h1>

<button id="mainButton" onclick="drawCard()">
選ぶ！
</button>

<div id="result">？</div>

<div id="judgeButtons"></div>

<div id="message"></div>

<div id="omikuji"></div>

<script>

function drawCard(){

    const choices = [
        "いつもの真ん中!!!!!",
        "見えた、右下",
        "左上が光ってる…",
        "右上しかないっしょ",
        "左下の確率51%"
    ];

    const result =
    choices[Math.floor(Math.random() * choices.length)];

    document.getElementById("result").innerHTML =
    result;

    document.getElementById("judgeButtons").innerHTML = `
    
    <p class="question">結果は？</p>

    
    <button class="good" onclick="goodResult()">
    最高！
    </button>

    <button class="bad" onclick="badResult()">
    最低…
    </button>
    `;

    document.getElementById("message").innerHTML = "";
    document.getElementById("omikuji").innerHTML = "";
}

function goodResult(){

    let messages = [
        "よかたね！",
        "まあ当然だが。",
        "僕も嬉しいです🥹",
        "その代わり明日は…",
        "もう課金すんなよっ"
    ];

    let random =
    Math.floor(Math.random()*messages.length);

    document.getElementById("message").innerHTML =
    messages[random];

    document.getElementById("omikuji").innerHTML = "";
}

function badResult(){

    let excuses = [
        "ごめんね(*´ω｀*)",
        "やり方間違えちゃった？",
        "すまんとしか言えん",
        "欲を出した結果…か",
        "これは逆にレア。"
    ];

    let random =
    Math.floor(Math.random()*excuses.length);

    document.getElementById("message").innerHTML =
    excuses[random];

    let luck = [
        "大吉🌈",
        "中吉✨",
        "吉🍀",
        "小吉🙂",
        "凶☠️"
    ];

    let randomLuck =
    Math.floor(Math.random()*luck.length);

    document.getElementById("omikuji").innerHTML =
    "運気回復おみくじ：" + luck[randomLuck];
}

</script>

</body>
</html>
