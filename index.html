<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メンテナンス中（使えるよ）</title>

<style>

body{
    background-image: url("labo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color:white;
    font-family:sans-serif;
    text-align:center;
    margin-top:80px;

    min-height:100vh;
}
    
#characters{
    position:fixed;
    bottom:20px;
    left:50%;

    transform:translateX(-50%);

    z-index:1;
}

#michibiku{
    width:600px;

    animation:ponkotsu 1.8s infinite;

}


@keyframes ponkotsu{

    0%{ transform:translateX(0) translateY(0px) rotate(0deg); }
    10%{ transform:translateX(0) translateY(-2px) rotate(1deg); }
    20%{ transform:translateX(0) translateY(1px) rotate(-1deg); }
    30%{ transform:translateX(0) translateY(-1px) rotate(2deg); }
    35%{ transform:translateX(0) translateY(-1px) rotate(2deg); }
    40%{ transform:translateX(0) translateY(-1px) rotate(-3deg); }
    45%{ transform:translateX(0) translateY(2px) rotate(3deg); }
    50%{ transform:translateX(0) translateY(0px) rotate(0deg); }
    60%{ transform:translateX(0) translateY(-4px) rotate(-2deg); }
    70%{ transform:translateX(0) translateY(1px) rotate(1deg); }
    80%{ transform:translateX(0) translateY(-1px) rotate(-1deg); }
    90%{ transform:translateX(0) translateY(2px) rotate(2deg); }
    100%{ transform:translateX(0) translateY(0px) rotate(0deg); }
}
    
h1{
    font-size:40px;

    background:rgba(0,0,0,0.6);

    padding:15px 25px;
    border-radius:20px;

    text-shadow:0 0 10px black;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
}

#mainButton{

    background:rgba(255,255,255,0.15);

    color:white;

    padding:16px 40px;

    font-size:34px;

    border-radius:20px;

    box-shadow:0 0 15px rgba(255,255,255,0.3);

    cursor:default;
}

.modeButton{

    background:gold;

    color:black;

    font-size:34px;

    font-weight:bold;

    padding:25px 35px;

    border-radius:25px;

    margin:15px;

    box-shadow:0 0 25px gold;
}

#modeButtons{

    display:flex;

    flex-direction:column;

    align-items:center;
}
    
.good{
    background:#4CAF50;
    color:white;
    
    font-size:32px;

    padding:18px 35px;

    border-radius:18px;
}

.bad{
    background:#ff4444;
    color:white;
    
    font-size:32px;

    padding:18px 35px;

    border-radius:18px;
}
    
#mode{
    font-size:32px;

    margin:0 auto 20px auto;

    background:rgba(0,0,0,0.55);

    display:block;

    width:fit-content;

    padding:12px 25px;

    border-radius:18px;

    text-shadow:0 0 10px black;
}

#mode:empty{
    display:none;
}
    
#result{
    font-size:42px;
    margin:0 auto 25px auto;

    background:rgba(0,0,0,0.55);
    display:block;
    width:fit-content;

    padding:15px 30px;
    border-radius:18px;

    text-shadow:0 0 10px black;
}

#message{
    margin-top:30px;
    font-size:28px;

    background:rgba(0,0,0,0.55);
    display:inline-block;

    padding:10px 20px;
    border-radius:15px;
}

#omikuji{
    margin-top:20px;
    font-size:32px;
    color:gold;

    background:rgba(0,0,0,0.55);
    display:inline-block;

    padding:10px 20px;
    border-radius:15px;
}

    .question{

    font-size:42px;

    margin-top:30px;

    margin-bottom:20px;

    color:white;

    text-shadow:0 0 10px black;
}
    
#result:empty,
#message:empty,
#omikuji:empty,
#judgeButtons:empty{
    display:none;
}    

.happy{
    animation: happyMove 0.5s infinite !important;
}

.sad{
    animation: sadMove 0.2s infinite !important;
    filter: hue-rotate(-40deg);
}

@keyframes happyMove{
    0%{ transform:translateX(0) translateY(0px) rotate(0deg); }
    50%{ transform:translateX(0) translateY(-25px) rotate(5deg); }
    100%{ transform:translateX(0) translateY(0px) rotate(0deg); }
}

@keyframes sadMove{
    0%{ transform:translateX(0) rotate(-2deg); }
    25%{ transform:translateX(0) rotate(2deg); }
    50%{ transform:translateX(0) rotate(-3deg); }
    75%{ transform:translateX(0) rotate(3deg); }
    100%{ transform:translateX(0) rotate(-2deg); }
}
    
</style>
</head>

<body>

<h1>メンテナンス中（使えるよ）</h1>

<div id="characters">

<img src="導くくんver3.png" id="michibiku">

</div>

<button id="mainButton" >
解析モード選択
</button>

<div id="modeButtons">

<button class="modeButton"
onclick="drawCard('ponkotsu')">

いつものポンコツ解析

</button>

<button class="modeButton"
onclick="drawCard('serious')">

無理して本気解析

</button>

</div>
    
<div id="mode"></div>
    
<div id="result"></div>

<div id="judgeButtons"></div>

<div id="message"></div>

<div id="omikuji"></div>

<script>

function drawCard(mode){
    
    const choices = [
        "いつもの真ん中だよ！",
        "えっとね〜、み…右下！",
        "左上が光ってる…？んん？",
        "ミミみっみみみ右上ええ、え",
        "左下の確率21%！チャンス！"
    ];

if(mode === "ponkotsu"){

    document.getElementById("mode").innerHTML =
    "いつものポンコツ解析";

}else{

    document.getElementById("mode").innerHTML =
    "無理して本気解析";
}

    document.getElementById("modeButtons").style.display = "none";
    
    const result =
    choices[Math.floor(Math.random() * choices.length)];

    document.getElementById("mainButton").innerHTML =
    "解析結果";
    
    document.getElementById("mainButton").onclick = null;

    document.getElementById("result").innerHTML =
    result;

    document.getElementById("judgeButtons").innerHTML = `
    <p class="question">結果は？</p>

    <button class="good" onclick="goodResult()">
    最高！
    </button>

    <button class="bad" onclick="badResult()">
    最低…
    </button>
    `;

    document.getElementById("message").innerHTML = "";
    document.getElementById("omikuji").innerHTML = "";

    document.getElementById("michibiku").className =
"";
}

function goodResult(){

    let messages = [
        "よかたね！",
        "まあ当然だが。",
        "僕も嬉しいです🥹",
        "その代わり明日は…",
        "もう課金すんなよっ"
    ];

    let random =
    Math.floor(Math.random()*messages.length);

    document.getElementById("message").innerHTML =
    messages[random];

    document.getElementById("omikuji").innerHTML = "";

    document.getElementById("michibiku").className =
"happy";
}

function badResult(){

    let excuses = [
        "ごめんね(*´ω｀*)",
        "やり方間違えちゃった？",
        "すまんとしか言えん",
        "欲を出した結果…か",
        "これは逆にレア。"
    ];

    let random =
    Math.floor(Math.random()*excuses.length);

    document.getElementById("message").innerHTML =
    excuses[random];

    let luck = [
        "大吉🌈",
        "中吉✨",
        "吉🍀",
        "小吉🙂",
        "凶☠️"
    ];

    let randomLuck =
    Math.floor(Math.random()*luck.length);

    document.getElementById("omikuji").innerHTML =
    "運気回復おみくじ：" + luck[randomLuck];

    document.getElementById("michibiku").className =
"sad";
}

</script>

</body>
</html>
